name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-darwin:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Release (macOS)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-windows:
    needs: release-darwin
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Windows binary
        run: |
          $version = "${{ github.ref_name }}"
          $name = "ZomboidAutoBackup_${version}_windows_amd64"
          $env:CGO_ENABLED = "1"
          go build -trimpath -ldflags "-s -w -H=windowsgui" -o "${name}\ZomboidAutoBackup.exe" .
          Copy-Item README.md "${name}\"
          Copy-Item LICENSE "${name}\"
          Compress-Archive -Path "${name}" -DestinationPath "${name}.zip"
          echo "ASSET=${name}.zip" >> $env:GITHUB_ENV

      - name: Upload Windows binary to release
        run: gh release upload ${{ github.ref_name }} ${{ env.ASSET }} --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
